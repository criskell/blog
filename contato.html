<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="no-index, no-follow">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Contato - Blog</title>
</head>
<body>
    <header>
        <div class="cover"></div>
        
        <nav class="header__nav">
            <div class="toggle-mobile-nav">
                <svg viewBox="0 0 100 80" width="25" height="25">
                    <rect width="100" height="20" rx="8"></rect>
                    <rect y="30" width="100" height="20" rx="8"></rect>
                    <rect y="60" width="100" height="20" rx="8"></rect>
                </svg>
            </div>

            <ul class="nav-list">
                <li>
                    <a href="index.html">Início</a>
                </li>
                <li>
                    <a href="sobre.html">Sobre</a>
                </li>
            </ul>

            <img src="https://c.tenor.com/tmNnUiYvzvUAAAAd/eren-eren-yeager.gif" alt="Eren Yeager falando" class="user-photo">

            <ul class="nav-list">
                <li>
                    <a href="index.html">Posts</a>
                </li>
                <li>
                    <a href="contato.html">Contato</a>
                </li>
            </ul>
            
            <div class="toggle-dark-buttons">
                <img src="https://cdn.iconscout.com/icon/free/png-256/sun-2130753-1798521.png" width="32" height="32" class="toggleDark enableLight">
                <img src="https://cdn.iconscout.com/icon/free/png-256/moon-1716354-1461199.png" width="32" height="32" class="toggleDark enableDark">
            </div>
        </nav>

        <nav class="header__nav mobile">
            <ul>
                <li>
                    <a href="index.html">Início</a>
                </li>
                <li>
                    <a href="sobre.html">Sobre</a>
                </li>
                <li>
                    <a href="index.html">Posts</a>
                </li>
                <li>
                    <a href="contato.html">Contato</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="posts">
            <article class="post">
                <div class="post__main" style="flex-basis: 100%;">
                    <header class="post__header">
                        <h1>Contato</h1>
                    </header>
                    <div class="post__body">
                        <form action="">
                            <div class="form-group">
                                <label for="name">Nome</label>
                                <input type="text" name="name" id="name" placeholder="Digite seu nome aqui...">
                            </div>
                            <div class="form-group">
                                <label for="email">E-mail</label>
                                <input type="text" name="email" id="email" placeholder="Digite seu e-mail aqui...">
                            </div>
                            <div class="form-group">
                                <label for="subject">Assunto</label>
                                <input type="text" name="subject" id="subject" placeholder="Digite o assunto aqui...">
                            </div>
                            <div class="form-group">
                                <label for="message">Mensagem</label>
                                <textarea name="message"></textarea>
                            </div>
                            <button type="submit">Enviar mensagem</button>
                        </form>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <footer>
        <p>Blog 2022 &copy;</p>
    </footer>

    <script>
        const $toggleDark = document.querySelectorAll('.toggleDark');
        const $html = document.querySelector('html');
        const $toggleMobileNav = document.querySelector('.toggle-mobile-nav');
        const $navMobile = document.querySelector('.header__nav.mobile');

        function toggleDarkTheme() {
            $html.classList.toggle('dark');

            if ($html.classList.has('dark')) {
                localStorage.setItem('enableDarkTheme', true);
            }
        }

        function toggleMobileNav() {
            if (getComputedStyle($navMobile).display === 'none') {
                $navMobile.style.display = 'flex';
            } else {
                $navMobile.style.display = 'none';
            }
        }

        try {
            if (localStorage.getItem('enableDarkTheme')) {
                toggleDarkTheme();
            }
        } catch (e) {
            console.log(e);
        }

        $toggleDark.forEach($el => $el.addEventListener('click', toggleDarkTheme));
        $toggleMobileNav.addEventListener('click', toggleMobileNav);
    </script>
</body>
</html>
