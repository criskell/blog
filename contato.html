<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="blog.css">
    <title>Blog</title>
</head>
<body>
    <header>
        <div class="cover"></div>
        
        <nav class="header__nav">
            <ul>
                <li>
                    <a href="blog.html">Início</a>
                </li>
                <li>
                    <a href="sobre.html">Sobre</a>
                </li>
            </ul>

            <img src="https://c.tenor.com/tmNnUiYvzvUAAAAd/eren-eren-yeager.gif" alt="Eren Yeager falando" class="user-photo">

            <ul>
                <li>
                    <a href="blog.html">Posts</a>
                </li>
                <aside>
                    <a href="contato.html">Contato</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="posts">
            <article class="post">
                <div class="post__main" style="flex-basis: 100%;">
                    <header class="post__header">
                        <h1>Contato</h1>
                    </header>
                    <div class="post__body">
                        <form action="">
                            <div class="form-group">
                                <label for="name">Nome</label>
                                <input type="text" name="name" id="name" placeholder="Digite seu nome aqui...">
                            </div>
                            <div class="form-group">
                                <label for="email">E-mail</label>
                                <input type="text" name="email" id="email" placeholder="Digite seu e-mail aqui...">
                            </div>
                            <div class="form-group">
                                <label for="subject">Assunto</label>
                                <input type="text" name="subject" id="subject" placeholder="Digite o assunto aqui...">
                            </div>
                            <div class="form-group">
                                <label for="message">Mensagem</label>
                                <textarea name="message"></textarea>
                            </div>
                            <button type="submit">Enviar mensagem</button>
                        </form>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <footer>
        <p>Blog 2022 &copy;</p>
    </footer>
</body>
</html>
